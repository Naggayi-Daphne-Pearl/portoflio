<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0f0f12" />

		<title>Naggayi Daphne Pearl — Senior Full-Stack Developer</title>
		<meta
			name="description"
			content="Naggayi Daphne Pearl — Senior Full-Stack Developer in Kampala, Uganda. Scalable web, mobile and systems solutions across FinTech and HealthTech."
		/>

		<!-- Favicons -->
		<link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="%PUBLIC_URL%/favicon-32.png"
		/>
		<link
			rel="apple-touch-icon"
			href="%PUBLIC_URL%/apple-touch-icon.png"
		/>

		<!-- Open Graph (LinkedIn, WhatsApp, Facebook) -->
		<meta property="og:type" content="website" />
		<meta
			property="og:title"
			content="Naggayi Daphne Pearl — Senior Full-Stack Developer"
		/>
		<meta
			property="og:description"
			content="Scalable web, mobile and systems solutions across FinTech and HealthTech."
		/>
		<meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:url" content="%PUBLIC_URL%/" />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta
			name="twitter:title"
			content="Naggayi Daphne Pearl — Senior Full-Stack Developer"
		/>
		<meta
			name="twitter:description"
			content="Scalable web, mobile and systems solutions across FinTech and HealthTech."
		/>
		<meta name="twitter:image" content="%PUBLIC_URL%/og-image.png" />

		<script>
			// Apply saved theme before paint to avoid a flash of the wrong theme.
			(function () {
				try {
					var stored = localStorage.getItem("theme");
					var prefersDark =
						window.matchMedia &&
						window.matchMedia("(prefers-color-scheme: dark)")
							.matches;
					var theme = stored || (prefersDark ? "dark" : "light");
					document.documentElement.setAttribute("data-theme", theme);
				} catch (e) {}
			})();
		</script>
	</head>
	<body>
		<noscript>You need to enable JavaScript to run this app.</noscript>
		<div id="root"></div>
	</body>
</html>
